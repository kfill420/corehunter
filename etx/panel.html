<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Raid du Royaume – Overlay</title>

  <!-- Twitch Extension Helper -->
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      padding: 10px;
      background-color: transparent;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #attack { background: #c0392b; color: white; }
    #heal   { background: #27ae60; color: white; }
    #bomb   { background: #f39c12; color: black; }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="container">
    <button id="attack" disabled>⚔️ Attaque</button>
    <button id="heal" disabled>💚 Soin</button>
    <button id="bomb" disabled>💣 Bombe</button>
  </div>

  <script>
    let authToken = null;
    const API_BASE = 'https://fleshless-sallie-unideating.ngrok-free.dev';

    function enableButtons() {
      document.querySelectorAll('button')
        .forEach(b => b.disabled = false);
    }

    function disableButtons() {
      document.querySelectorAll('button')
        .forEach(b => b.disabled = true);
    }

    Twitch.ext.onAuthorized(async (auth) => {
      authToken = auth.token;

      try {
        const res = await fetch(`${API_BASE}/extension/me`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!res.ok) {
          console.error('❌ /extension/me failed', res.status);
          disableButtons();
          return;
        }

        const data = await res.json();

        // if (data.canInteract === true) {
          enableButtons();
        // } else {
        //   disableButtons();
        // }

      } catch (err) {
        console.error('❌ Fetch error:', err);
        disableButtons();
      }
    });

    function sendAction(action) {
      if (!authToken) return;

      fetch(`${API_BASE}/extension/action`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ action })
      }).catch(err => console.error('❌ Action error:', err));
    }

    document.getElementById('attack').onclick = () => sendAction('attack');
    document.getElementById('heal').onclick   = () => sendAction('heal');
    document.getElementById('bomb').onclick   = () => sendAction('bomb');
  </script>
</body>
</html>
